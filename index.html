<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corte Piedra</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

</head>

<body>

<!-- LOADING SCREEN -->

<div id="loader">

<img src="logo.png" class="logoLoader">

<div class="spinner"></div>

</div>


<!-- HERO -->

<header class="hero">

<img src="logo.png" class="logo">

<div class="heroButtons">

<a href="#menu" class="btn">Ver Menú</a>

<a href="https://wa.me/59398687649" class="btn">WhatsApp</a>

<a href="https://www.instagram.com/cortepiedra.rest/?hl=en" class="btn">Instagram</a>

<button onclick="openReview()" class="btn">Calificar ⭐</button>

</div>

</header>


<!-- MENU -->

<section id="menu">

<h1>Menú Corte Piedra</h1>

<p>Próximamente aquí aparecerá el menú interactivo.</p>

</section>


<!-- REVIEW MODAL -->

<div id="reviewBox">

<h2>Califica tu experiencia</h2>

<form id="reviewForm">

<input type="text" name="nombre" placeholder="Tu nombre (opcional)">

<label>Comida</label>
<input type="range" min="1" max="5" name="comida">

<label>Atención</label>
<input type="range" min="1" max="5" name="atencion">

<label>Ambiente</label>
<input type="range" min="1" max="5" name="ambiente">

<textarea name="mensaje" placeholder="Cuéntanos tu experiencia"></textarea>

<button type="submit">Enviar reseña</button>

</form>

<button onclick="closeReview()">Cerrar</button>

</div>

<script src="script.js"></script>

</body>
</html>
